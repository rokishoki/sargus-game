<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flat Block World</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #111; font-family: Arial, sans-serif; color: #fff; }
    canvas { display: block; width: 100vw; height: 100vh; }
    #overlay { position: absolute; top: 18px; left: 18px; z-index: 10; font-size: 13px; line-height: 1.6; text-shadow: 0 0 8px rgba(0,0,0,0.8); }
    #hotbar { position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; z-index: 10; }
    .slot { width: 34px; height: 34px; border: 2px solid rgba(255,255,255,0.45); background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; font-size: 12px; color: #fff; }
    .slot.active { border-color: #fff; }
    .crosshair { position: absolute; left: 50%; top: 50%; width: 16px; height: 16px; transform: translate(-50%, -50%); pointer-events: none; }
    .crosshair::before, .crosshair::after { content: ''; position: absolute; background: #fff; }
    .crosshair::before { left: 2px; top: 7px; width: 12px; height: 1px; }
    .crosshair::after { left: 7px; top: 2px; width: 1px; height: 12px; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="overlay">
    WASD Move | Space Jump | C Crouch<br>
    Left click Remove | Right click Place<br>
    1-4 Select Block Slot
  </div>
  <div id="hotbar"></div>
  <div class="crosshair"></div>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const hotbar = document.getElementById('hotbar');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const BLOCKS = [
      { id: 1, name: 'Grass', color: '#5BA93C' },
      { id: 2, name: 'Dirt', color: '#8B6F47' },
      { id: 3, name: 'Stone', color: '#888888' },
      { id: 4, name: 'Wood', color: '#8B5D2B' }
    ];

    const inventory = [
      { block: BLOCKS[0], count: 32 },
      { block: BLOCKS[1], count: 20 },
      { block: BLOCKS[2], count: 12 },
      { block: BLOCKS[3], count: 16 }
    ];

    let selectedSlot = 0;
    const world = new Map();
    const SIZE = 10;

    for (let x = -SIZE; x <= SIZE; x++) {
      for (let z = -SIZE; z <= SIZE; z++) {
        world.set(`${x},0,${z}`, BLOCKS[0]);
      }
    }

    const camera = {
      x: 0,
      y: 9,
      z: -12,
      yaw: 0,
      pitch: -0.35,
      speed: 0.18,
      vy: 0,
      crouch: false
    };

    const keys = {};

    function project(point) {
      const dx = point.x - camera.x;
      const dy = point.y - camera.y;
      const dz = point.z - camera.z;
      const cosY = Math.cos(camera.yaw);
      const sinY = Math.sin(camera.yaw);
      const cosP = Math.cos(camera.pitch);
      const sinP = Math.sin(camera.pitch);
      const rx = dx * cosY - dz * sinY;
      const rz = dx * sinY + dz * cosY;
      const ry = dy;
      const ty = ry * cosP - rz * sinP;
      const tz = ry * sinP + rz * cosP;
      if (tz <= 0.2) return null;
      const scale = 550 / tz;
      return {
        x: canvas.width / 2 + rx * scale,
        y: canvas.height / 2 - ty * scale,
        s: scale
      };
    }

    function corners(x, y, z) {
      return [
        { x, y, z },
        { x + 1, y, z },
        { x + 1, y + 1, z },
        { x, y + 1, z },
        { x, y, z + 1 },
        { x + 1, y, z + 1 },
        { x + 1, y + 1, z + 1 },
        { x, y + 1, z + 1 }
      ];
    }

    const faces = [
      [0,1,2,3],
      [4,5,6,7],
      [0,1,5,4],
      [3,2,6,7],
      [0,3,7,4],
      [1,2,6,5]
    ];

    function drawBlock(x, y, z, block) {
      const pts = corners(x, y, z).map(project);
      if (pts.some(p => p === null)) return;
      const order = [1,0,2,3,4,5];
      order.forEach((fi) => {
        const face = faces[fi].map(i => pts[i]);
        ctx.beginPath();
        ctx.moveTo(face[0].x, face[0].y);
        face.slice(1).forEach(p => ctx.lineTo(p.x, p.y));
        ctx.closePath();
        const shade = fi === 1 ? 0.82 : (fi === 2 || fi === 3 ? 0.92 : 1);
        ctx.fillStyle = shadeColor(block.color, shade);
        ctx.fill();
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 1;
        ctx.stroke();
      });
    }

    function shadeColor(hex, factor) {
      const num = parseInt(hex.slice(1), 16);
      const r = Math.round(((num >> 16) & 255) * factor);
      const g = Math.round(((num >> 8) & 255) * factor);
      const b = Math.round((num & 255) * factor);
      return `rgb(${r},${g},${b})`;
    }

    function drawWorld() {
      ctx.fillStyle = '#87CEEB';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      const drawn = [];
      world.forEach((block, key) => {
        const [x,y,z] = key.split(',').map(Number);
        const center = project({ x: x + 0.5, y: y + 0.5, z: z + 0.5 });
        if (!center) return;
        drawn.push({ x, y, z, block, depth: center.y });
      });
      drawn.sort((a,b) => b.depth - a.depth);
      drawn.forEach(entry => drawBlock(entry.x, entry.y, entry.z, entry.block));
    }

    function groundHeight(x, z) {
      for (let y = 3; y >= 0; y--) {
        if (world.has(`${x},${y},${z}`)) return y;
      }
      return -1;
    }

    function update() {
      const forward = (keys['w'] ? 1 : 0) - (keys['s'] ? 1 : 0);
      const right = (keys['d'] ? 1 : 0) - (keys['a'] ? 1 : 0);
      const dx = Math.sin(camera.yaw) * forward + Math.cos(camera.yaw) * right;
      const dz = Math.cos(camera.yaw) * forward - Math.sin(camera.yaw) * right;
      camera.x += dx * camera.speed;
      camera.z += dz * camera.speed;
      const ground = groundHeight(Math.floor(camera.x), Math.floor(camera.z));
      if (!camera.crouch) camera.vy -= 0.012;
      if (keys[' '] && Math.abs(camera.y - (ground + 2.3)) < 0.18) camera.vy = 0.22;
      camera.y += camera.vy;
      if (camera.y < ground + 2.3) {
        camera.y = ground + 2.3;
        camera.vy = 0;
      }
      if (camera.crouch) camera.y = ground + 1.7;
    }

    function castRay(maxDistance) {
      const dir = {
        x: Math.sin(camera.yaw) * Math.cos(camera.pitch),
        y: Math.sin(camera.pitch),
        z: Math.cos(camera.yaw) * Math.cos(camera.pitch)
      };
      for (let d = 0.6; d < maxDistance; d += 0.2) {
        const x = Math.floor(camera.x + dir.x * d);
        const y = Math.floor(camera.y + dir.y * d);
        const z = Math.floor(camera.z + dir.z * d);
        if (world.has(`${x},${y},${z}`)) {
          return { x, y, z, face: { x: Math.sign(dir.x), y: Math.sign(dir.y), z: Math.sign(dir.z) } };
        }
      }
      return null;
    }

    function placeBlock() {
      const hit = castRay(6);
      if (!hit) return;
      const nx = hit.x + (Math.abs(hit.face.x) > 0 ? hit.face.x : 0);
      const ny = hit.y + (Math.abs(hit.face.y) > 0 ? hit.face.y : 1);
      const nz = hit.z + (Math.abs(hit.face.z) > 0 ? hit.face.z : 0);
      const key = `${nx},${ny},${nz}`;
      if (!world.has(key)) {
        world.set(key, inventory[selectedSlot].block);
      }
    }

    function removeBlock() {
      const hit = castRay(6);
      if (!hit) return;
      world.delete(`${hit.x},${hit.y},${hit.z}`);
    }

    function renderHotbar() {
      hotbar.innerHTML = '';
      inventory.forEach((slot, idx) => {
        const el = document.createElement('div');
        el.className = 'slot' + (idx === selectedSlot ? ' active' : '');
        el.textContent = slot.block.name[0] + (slot.count > 1 ? slot.count : '');
        hotbar.appendChild(el);
      });
    }

    function loop() {
      update();
      drawWorld();
      renderHotbar();
      requestAnimationFrame(loop);
    }

    window.addEventListener('keydown', (e) => {
      keys[e.key.toLowerCase()] = true;
      if (e.key === 'c') camera.crouch = !camera.crouch;
      if (e.key >= '1' && e.key <= '4') selectedSlot = Number(e.key) - 1;
    });
    window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });
    window.addEventListener('mousemove', (e) => {
      if (document.pointerLockElement === canvas) {
        camera.yaw -= e.movementX * 0.002;
        camera.pitch -= e.movementY * 0.002;
        camera.pitch = Math.max(-1.3, Math.min(1.3, camera.pitch));
      }
    });
    canvas.addEventListener('click', () => canvas.requestPointerLock());
    canvas.addEventListener('mousedown', (e) => {
      if (e.button === 2) placeBlock();
      if (e.button === 0) removeBlock();
    });
    canvas.addEventListener('contextmenu', e => e.preventDefault());
    renderHotbar();
    loop();
  </script>
</body>

        const visible = face.every(p => p.x !== null);
