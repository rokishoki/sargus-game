<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Minecraft</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #gameCanvas {
      display: block;
    }

    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      background: rgba(0, 0, 0, 0.5);
      padding: 10px;
      border-radius: 5px;
      font-size: 14px;
    }

    #crosshair {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 20px;
      height: 20px;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    #crosshair::before,
    #crosshair::after {
      content: '';
      position: absolute;
      background: white;
    }

    #crosshair::before {
      width: 2px;
      height: 20px;
      left: 9px;
    }

    #crosshair::after {
      width: 20px;
      height: 2px;
      top: 9px;
    }

    #inventory {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 5px;
      background: rgba(0, 0, 0, 0.5);
      padding: 10px;
      border-radius: 5px;
    }

    .block-item {
      width: 40px;
      height: 40px;
      border: 2px solid #666;
      cursor: pointer;
      border-radius: 5px;
    }

    .block-item.selected {
      border-color: white;
      box-shadow: 0 0 10px white;
    }

    #instructions {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      background: rgba(0, 0, 0, 0.8);
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      z-index: 1000;
    }

    #instructions button {
      margin-top: 10px;
      padding: 10px 20px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="instructions">
    <h2>Welcome to 3D Minecraft</h2>
    <p>WASD to move, Mouse to look around</p>
    <p>Left click to break blocks, Right click to place</p>
    <p>Scroll to change block type</p>
    <button id="startButton">Start Game</button>
  </div>

  <canvas id="gameCanvas"></canvas>

  <div id="ui">
    <div>Position: <span id="position">0, 0, 0</span></div>
    <div>Block: <span id="selectedBlock">Grass</span></div>
  </div>

  <div id="crosshair"></div>

  <div id="inventory">
    <div id="grass" class="block-item selected" style="background-color: #228B22;" data-block="grass"></div>
    <div id="dirt" class="block-item" style="background-color: #8B4513;" data-block="dirt"></div>
    <div id="stone" class="block-item" style="background-color: #696969;" data-block="stone"></div>
    <div id="wood" class="block-item" style="background-color: #8B4513;" data-block="wood"></div>
    <div id="sand" class="block-item" style="background-color: #F4A460;" data-block="sand"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ui = document.getElementById('ui');
    const positionEl = document.getElementById('position');
    const selectedBlockEl = document.getElementById('selectedBlock');
    const instructions = document.getElementById('instructions');
    const startButton = document.getElementById('startButton');
    const blockItems = document.querySelectorAll('.block-item');

    let scene, camera, renderer, controls;
    let world = {};
    let selectedBlock = 'grass';
    let isLocked = false;
    let velocity = new THREE.Vector3();
    let direction = new THREE.Vector3();
    let prevTime = performance.now();
    let mobs = [];

    const CHUNK_SIZE = 16;
    const WORLD_HEIGHT = 64;
    const GRAVITY = -9.8;
    const JUMP_FORCE = 15;
    const MOVE_SPEED = 20;
    const loadedChunks = new Set();

    const blockMaterials = {
      grass: new THREE.MeshLambertMaterial({ color: 0x228B22 }),
      dirt: new THREE.MeshLambertMaterial({ color: 0x8B4513 }),
      stone: new THREE.MeshLambertMaterial({ color: 0x696969 }),
      wood: new THREE.MeshLambertMaterial({ color: 0x8B4513 }),
      sand: new THREE.MeshLambertMaterial({ color: 0xF4A460 }),
    };

    function init() {
      // Scene
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x87CEEB);

      // Camera
      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 20, 0);

      // Renderer
      renderer = new THREE.WebGLRenderer({ canvas });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;

      // Lighting
      const ambientLight = new THREE.AmbientLight(0x404040, 0.6);
      scene.add(ambientLight);

      const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
      directionalLight.position.set(50, 50, 50);
      directionalLight.castShadow = true;
      directionalLight.shadow.mapSize.width = 2048;
      directionalLight.shadow.mapSize.height = 2048;
      scene.add(directionalLight);

      // Generate initial world
      generateChunk(0, 0);

      // Add mobs
      spawnMobs();

      // Event listeners
      startButton.addEventListener('click', startGame);
      document.addEventListener('keydown', onKeyDown);
      document.addEventListener('keyup', onKeyUp);
      document.addEventListener('click', onMouseClick);
      document.addEventListener('contextmenu', onRightClick);
      document.addEventListener('wheel', onWheel);
      window.addEventListener('resize', onWindowResize);

      blockItems.forEach(item => {
        item.addEventListener('click', () => selectBlock(item.dataset.block));
      });

      animate();
    }

    function startGame() {
      instructions.style.display = 'none';
      isLocked = true;
      ui.style.display = 'block';
      prevTime = performance.now();
    }

    function generateChunk(chunkX, chunkZ) {
      const chunkKey = `${chunkX},${chunkZ}`;
      if (loadedChunks.has(chunkKey)) return;
      loadedChunks.add(chunkKey);

      for (let x = 0; x < CHUNK_SIZE; x++) {
        for (let z = 0; z < CHUNK_SIZE; z++) {
          const worldX = chunkX * CHUNK_SIZE + x;
          const worldZ = chunkZ * CHUNK_SIZE + z;
          // Flat platform: grass at y=10, dirt below
          for (let y = 0; y <= 10; y++) {
            let blockType = 'dirt';
            if (y === 10) blockType = 'grass';
            placeBlock(worldX, y, worldZ, blockType);
          }
        }
      }
    }

    function updateChunks() {
      const playerChunkX = Math.floor(camera.position.x / CHUNK_SIZE);
      const playerChunkZ = Math.floor(camera.position.z / CHUNK_SIZE);

      for (let dx = -2; dx <= 2; dx++) {
        for (let dz = -2; dz <= 2; dz++) {
          generateChunk(playerChunkX + dx, playerChunkZ + dz);
        }
      }
    }

    function spawnMobs() {
      const mobTypes = ['pig', 'sheep', 'cow', 'chicken'];
      for (let i = 0; i < 20; i++) {
        const type = mobTypes[Math.floor(Math.random() * mobTypes.length)];
        const x = (Math.random() - 0.5) * 100;
        const z = (Math.random() - 0.5) * 100;
        const y = 12; // On ground level
        createMob(type, x, y, z);
      }
    }

    function createMob(type, x, y, z) {
      const geometry = new THREE.BoxGeometry(1, 1, 1);
      const material = new THREE.MeshLambertMaterial({ color: getMobColor(type) });
      const mob = new THREE.Mesh(geometry, material);
      mob.position.set(x, y, z);
      mob.userData = { type, velocity: new THREE.Vector3(), targetX: x, targetZ: z, moveTimer: 0 };
      scene.add(mob);
      mobs.push(mob);
    }

    function getMobColor(type) {
      const colors = {
        pig: 0xFF69B4,
        sheep: 0xFFFFFF,
        cow: 0x8B4513,
        chicken: 0xFFFF00
      };
      return colors[type] || 0xFF0000;
    }

    function updateMobs(delta) {
      mobs.forEach(mob => {
        // Simple AI: move towards random targets
        mob.userData.moveTimer -= delta;
        if (mob.userData.moveTimer <= 0) {
          mob.userData.targetX = mob.position.x + (Math.random() - 0.5) * 20;
          mob.userData.targetZ = mob.position.z + (Math.random() - 0.5) * 20;
          mob.userData.moveTimer = Math.random() * 3000 + 1000; // 1-4 seconds
        }

        // Move towards target
        const dx = mob.userData.targetX - mob.position.x;
        const dz = mob.userData.targetZ - mob.position.z;
        const dist = Math.sqrt(dx * dx + dz * dz);
        if (dist > 0.1) {
          mob.userData.velocity.x = (dx / dist) * 2;
          mob.userData.velocity.z = (dz / dist) * 2;
        } else {
          mob.userData.velocity.x = 0;
          mob.userData.velocity.z = 0;
        }

        mob.position.x += mob.userData.velocity.x * delta * 0.001;
        mob.position.z += mob.userData.velocity.z * delta * 0.001;

        // Keep on ground
        const groundY = getGroundHeight(mob.position.x, mob.position.z);
        mob.position.y = groundY + 0.5;
      });
    }

    function getGroundHeight(x, z) {
      for (let y = WORLD_HEIGHT; y >= 0; y--) {
        if (world[`${Math.floor(x)},${y},${Math.floor(z)}`]) {
          return y + 1;
        }
      }
      return 10; // Default ground level
    }

    function placeBlock(x, y, z, type) {
      const key = `${x},${y},${z}`;
      if (world[key]) {
        scene.remove(world[key]);
      }

      const geometry = new THREE.BoxGeometry(1, 1, 1);
      const material = blockMaterials[type];
      const cube = new THREE.Mesh(geometry, material);
      cube.position.set(x, y, z);
      cube.castShadow = true;
      cube.receiveShadow = true;
      scene.add(cube);
      world[key] = cube;
    }

    function removeBlock(x, y, z) {
      const key = `${x},${y},${z}`;
      if (world[key]) {
        scene.remove(world[key]);
        delete world[key];
      }
    }

    function getBlockAt(x, y, z) {
      const key = `${x},${y},${z}`;
      return world[key] ? key : null;
    }

    function selectBlock(type) {
      selectedBlock = type;
      selectedBlockEl.textContent = type.charAt(0).toUpperCase() + type.slice(1);
      blockItems.forEach(item => {
        item.classList.toggle('selected', item.dataset.block === type);
      });
    }

    function onKeyDown(event) {
      switch (event.code) {
        case 'ArrowUp':
        case 'KeyW':
          moveForward = true;
          break;
        case 'ArrowLeft':
        case 'KeyA':
          moveLeft = true;
          break;
        case 'ArrowDown':
        case 'KeyS':
          moveBackward = true;
          break;
        case 'ArrowRight':
        case 'KeyD':
          moveRight = true;
          break;
        case 'Space':
          if (canJump) {
            velocity.y += JUMP_FORCE;
            canJump = false;
          }
          break;
      }
    }

    function onKeyUp(event) {
      switch (event.code) {
        case 'ArrowUp':
        case 'KeyW':
          moveForward = false;
          break;
        case 'ArrowLeft':
        case 'KeyA':
          moveLeft = false;
          break;
        case 'ArrowDown':
        case 'KeyS':
          moveBackward = false;
          break;
        case 'ArrowRight':
        case 'KeyD':
          moveRight = false;
          break;
      }
    }

    function onMouseClick(event) {
      if (!isLocked) return;

      const raycaster = new THREE.Raycaster();
      const mouse = new THREE.Vector2();
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);

      const intersects = raycaster.intersectObjects(Object.values(world));
      if (intersects.length > 0) {
        const intersect = intersects[0];
        const point = intersect.point;
        const normal = intersect.face.normal;

        const blockPos = new THREE.Vector3(
          Math.floor(point.x + normal.x * 0.5),
          Math.floor(point.y + normal.y * 0.5),
          Math.floor(point.z + normal.z * 0.5)
        );

        removeBlock(blockPos.x, blockPos.y, blockPos.z);
      }
    }

    function onRightClick(event) {
      event.preventDefault();
      if (!isLocked) return;

      const raycaster = new THREE.Raycaster();
      const mouse = new THREE.Vector2();
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);

      const intersects = raycaster.intersectObjects(Object.values(world));
      if (intersects.length > 0) {
        const intersect = intersects[0];
        const point = intersect.point;
        const normal = intersect.face.normal;

        const blockPos = new THREE.Vector3(
          Math.floor(point.x + normal.x * 0.5),
          Math.floor(point.y + normal.y * 0.5),
          Math.floor(point.z + normal.z * 0.5)
        );

        placeBlock(blockPos.x, blockPos.y, blockPos.z, selectedBlock);
      }
    }

    function onWheel(event) {
      const blockTypes = ['grass', 'dirt', 'stone', 'wood', 'sand'];
      let currentIndex = blockTypes.indexOf(selectedBlock);
      if (event.deltaY > 0) {
        currentIndex = (currentIndex + 1) % blockTypes.length;
      } else {
        currentIndex = (currentIndex - 1 + blockTypes.length) % blockTypes.length;
      }
      selectBlock(blockTypes[currentIndex]);
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
      requestAnimationFrame(animate);

      const time = performance.now();
      const delta = time - prevTime;
      prevTime = time;

      if (isLocked) {
        // Movement
        direction.z = Number(moveForward) - Number(moveBackward);
        direction.x = Number(moveRight) - Number(moveLeft);
        direction.normalize();

        if (moveForward || moveBackward) velocity.z -= direction.z * MOVE_SPEED * delta * 0.001;
        if (moveLeft || moveRight) velocity.x -= direction.x * MOVE_SPEED * delta * 0.001;

        // Apply friction
        velocity.x *= 0.8;
        velocity.z *= 0.8;

        // Apply gravity
        velocity.y += GRAVITY * delta * 0.001;

        // Move camera
        camera.position.x += velocity.x * delta * 0.001;
        camera.position.y += velocity.y * delta * 0.001;
        camera.position.z += velocity.z * delta * 0.001;

        // Ground collision
        const groundY = getGroundHeight(camera.position.x, camera.position.z);
        if (camera.position.y <= groundY + 1.5) {
          velocity.y = 0;
          camera.position.y = groundY + 1.5;
          canJump = true;
        }

        // Update chunks
        updateChunks();

        // Update mobs
        updateMobs(delta);
      }

      // Update position display
      positionEl.textContent = `${Math.round(camera.position.x)}, ${Math.round(camera.position.y)}, ${Math.round(camera.position.z)}`;

      renderer.render(scene, camera);
    }

    // Pointer lock events
    document.addEventListener('pointerlockchange', () => {
      isLocked = document.pointerLockElement === document.body;
      if (isLocked) {
        ui.style.display = 'block';
      } else {
        ui.style.display = 'none';
      }
    });

    init();
  </script>
