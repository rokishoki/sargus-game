<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Minecraft</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #gameCanvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
      background: #000;
    }

    #startScreen {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(5, 5, 5, 0.95), rgba(20, 20, 20, 0.95));
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .start-panel {
      width: min(480px, 100%);
      background: rgba(30, 30, 30, 0.98);
      border: 2px solid rgba(255, 255, 255, 0.12);
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.7);
      color: white;
      text-align: center;
    }

    .start-title {
      font-size: 48px;
      letter-spacing: 0.2em;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .start-subtitle {
      font-size: 18px;
      color: #ddd;
      margin-bottom: 20px;
    }

    .start-form {
      display: grid;
      gap: 12px;
      margin-bottom: 18px;
    }

    .field-label {
      display: block;
      text-align: left;
      font-size: 12px;
      color: #ccc;
      margin-bottom: 4px;
    }

    .start-form input,
    .start-form select {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      outline: none;
      font-size: 14px;
    }

    .start-form button {
      width: 100%;
      padding: 14px 16px;
      border: none;
      border-radius: 8px;
      background: #4caf50;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .start-form button:hover {
      background: #57b15d;
    }

    .start-notes {
      font-size: 13px;
      color: #bbb;
      line-height: 1.5;
    }

    #ui {
      position: absolute;
      top: 16px;
      left: 16px;
      color: white;
      background: rgba(0, 0, 0, 0.5);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
      z-index: 20;
      min-width: 220px;
    }

    .hud-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    #crosshair {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 24px;
      height: 24px;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 10;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .game-active #crosshair {
      opacity: 1;
    }

    #crosshair::before,
    #crosshair::after {
      content: '';
      position: absolute;
      background: white;
    }

    #crosshair::before {
      width: 2px;
      height: 20px;
      left: 9px;
    }

    #crosshair::after {
      width: 20px;
      height: 2px;
      top: 9px;
    }

    .game-active {
      cursor: none;
    }

    #inventory {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 5px;
      background: rgba(0, 0, 0, 0.5);
      padding: 10px;
      border-radius: 5px;
    }

    #fullInventory {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.9);
      padding: 20px;
      border-radius: 10px;
      display: none;
      z-index: 2000;
      max-width: 600px;
    }

    #fullInventory h3 {
      color: white;
      margin-top: 0;
      text-align: center;
    }

    .inventory-grid {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      gap: 2px;
      margin-bottom: 20px;
    }

    .inventory-slot {
      width: 40px;
      height: 40px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 12px;
      cursor: pointer;
      position: relative;
    }

    .inventory-slot:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .inventory-slot.selected {
      border-color: yellow;
      box-shadow: 0 0 5px yellow;
    }

    .crafting-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
      margin-bottom: 10px;
    }

    .crafting-result {
      width: 40px;
      height: 40px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 12px;
      margin: 0 auto;
    }

    #health-bar {
      position: absolute;
      top: 10px;
      right: 10px;
      display: none;
      gap: 2px;
      z-index: 20;
    }

    .heart {
      width: 20px;
      height: 20px;
      background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="red"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>') no-repeat center;
      background-size: contain;
    }

    .heart.empty {
      opacity: 0.3;
    }

    .block-item {
      width: 40px;
      height: 40px;
      border: 2px solid #666;
      cursor: pointer;
      border-radius: 5px;
    }

    .block-item.selected {
      border-color: white;
      box-shadow: 0 0 10px white;
    }

    #instructions {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      background: rgba(0, 0, 0, 0.8);
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      z-index: 1000;
    }

    #instructions button {
      margin-top: 10px;
      padding: 10px 20px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <div id="startScreen">
    <div class="start-panel">
      <div class="start-title">Minecraft</div>
      <div class="start-subtitle">Singleplayer</div>
      <div class="start-form">
        <label class="field-label" for="worldName">World Name</label>
        <input id="worldName" type="text" value="New World" />

        <label class="field-label" for="worldSeed">Seed</label>
        <input id="worldSeed" type="text" placeholder="Random seed" />

        <label class="field-label" for="gameMode">Game Mode</label>
        <select id="gameMode">
          <option value="survival">Survival</option>
          <option value="creative">Creative</option>
        </select>

        <button id="startButton">Create New World</button>
      </div>
      <div class="start-notes">
        <p>WASD to move, mouse to look around.</p>
        <p>Left click to mine, right click to place, E to open inventory.</p>
      </div>
    </div>
  </div>

  <div id="ui">
    <div class="hud-row">
      <div>Coordinates: <span id="position">0, 0, 0</span></div>
      <div>Selected: <span id="selectedBlock">None</span></div>
    </div>
  </div>

  <div id="crosshair"></div>

  <div id="fullInventory">
    <h3>Inventory</h3>
    <div class="inventory-grid" id="inventoryGrid">
      <!-- 36 inventory slots will be created by JavaScript -->
    </div>
    <h4>Crafting</h4>
    <div class="crafting-grid" id="craftingGrid">
      <!-- 9 crafting slots -->
    </div>
    <div class="crafting-result" id="craftingResult"></div>
  </div>

  <div id="health-bar">
    <!-- 10 hearts will be created by JavaScript -->
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ui = document.getElementById('ui');
    const positionEl = document.getElementById('position');
    const selectedBlockEl = document.getElementById('selectedBlock');
    const startScreen = document.getElementById('startScreen');
    const startButton = document.getElementById('startButton');
    const fullInventory = document.getElementById('fullInventory');
    const inventoryGrid = document.getElementById('inventoryGrid');
    const craftingGrid = document.getElementById('craftingGrid');
    const craftingResult = document.getElementById('craftingResult');
    const healthBar = document.getElementById('healthBar');
    const worldNameInput = document.getElementById('worldName');
    const worldSeedInput = document.getElementById('worldSeed');
    const gameModeSelect = document.getElementById('gameMode');

    let scene, camera, renderer, controls;
    let world = {};
    let selectedSlot = 0;
    let isLocked = false;
    let inventoryOpen = false;
    let velocity = new THREE.Vector3();
    let direction = new THREE.Vector3();
    let prevTime = performance.now();
    let prevMouseX = window.innerWidth / 2;
    let prevMouseY = window.innerHeight / 2;
    let mobs = [];
    let dayTime = 0;
    let yaw = 0;
    let pitch = 0;
    let moveForward = false;
    let moveBackward = false;
    let moveLeft = false;
    let moveRight = false;
    let canJump = true;
    let health = 20;
    let hunger = 20;

    // Player stats
    let player = {
      health: 20,
      hunger: 20,
      experience: 0,
      level: 1,
      inventory: new Array(36).fill(null),
      craftingGrid: new Array(9).fill(null),
      selectedSlot: 0
    };

    const CHUNK_SIZE = 16;
    const WORLD_HEIGHT = 64;
    const GRAVITY = -30;
    const JUMP_FORCE = 15;
    const MOVE_SPEED = 25;
    const loadedChunks = new Set();

    // Tool materials and their properties
    const toolMaterials = {
      wooden: { durability: 60, multiplier: 2, color: 0x8B4513 },
      stone: { durability: 132, multiplier: 4, color: 0x696969 },
      iron: { durability: 251, multiplier: 6, color: 0xD3D3D3 },
      diamond: { durability: 1562, multiplier: 8, color: 0xB9F2FF }
    };

    // Block hardness and required tools
    const blockProperties = {
      grass: { hardness: 0.6, tool: 'shovel', drops: 'dirt' },
      dirt: { hardness: 0.5, tool: 'shovel', drops: 'dirt' },
      stone: { hardness: 1.5, tool: 'pickaxe', drops: 'cobblestone' },
      cobblestone: { hardness: 2.0, tool: 'pickaxe', drops: 'cobblestone' },
      wood: { hardness: 2.0, tool: 'axe', drops: 'wood' },
      sand: { hardness: 0.5, tool: 'shovel', drops: 'sand' },
      iron_ore: { hardness: 3.0, tool: 'pickaxe', drops: 'iron_ore', minTool: 'stone' },
      coal_ore: { hardness: 3.0, tool: 'pickaxe', drops: 'coal', minTool: 'wooden' },
      gold_ore: { hardness: 3.0, tool: 'pickaxe', drops: 'gold_ore', minTool: 'iron' },
      diamond_ore: { hardness: 3.0, tool: 'pickaxe', drops: 'diamond', minTool: 'iron' }
    };

    // Items and their properties
    const items = {
      // Blocks
      grass: { type: 'block', stackSize: 64, texture: 'grass' },
      dirt: { type: 'block', stackSize: 64, texture: 'dirt' },
      stone: { type: 'block', stackSize: 64, texture: 'stone' },
      cobblestone: { type: 'block', stackSize: 64, texture: 'cobblestone' },
      wood: { type: 'block', stackSize: 64, texture: 'wood' },
      sand: { type: 'block', stackSize: 64, texture: 'sand' },

      // Ores/Drops
      iron_ore: { type: 'item', stackSize: 64, texture: 'iron_ore' },
      coal: { type: 'item', stackSize: 64, texture: 'coal' },
      gold_ore: { type: 'item', stackSize: 64, texture: 'gold_ore' },
      diamond: { type: 'item', stackSize: 64, texture: 'diamond' },

      // Tools
      wooden_pickaxe: { type: 'tool', stackSize: 1, material: 'wooden', toolType: 'pickaxe' },
      wooden_axe: { type: 'tool', stackSize: 1, material: 'wooden', toolType: 'axe' },
      wooden_shovel: { type: 'tool', stackSize: 1, material: 'wooden', toolType: 'shovel' },
      stone_pickaxe: { type: 'tool', stackSize: 1, material: 'stone', toolType: 'pickaxe' },
      stone_axe: { type: 'tool', stackSize: 1, material: 'stone', toolType: 'axe' },
      stone_shovel: { type: 'tool', stackSize: 1, material: 'stone', toolType: 'shovel' },
      iron_pickaxe: { type: 'tool', stackSize: 1, material: 'iron', toolType: 'pickaxe' },
      iron_axe: { type: 'tool', stackSize: 1, material: 'iron', toolType: 'axe' },
      iron_shovel: { type: 'tool', stackSize: 1, material: 'iron', toolType: 'shovel' }
    };

    // Crafting recipes
    const recipes = {
      wooden_pickaxe: [
        ['wood', 'wood', 'wood'],
        [null, 'stick', null],
        [null, 'stick', null]
      ],
      wooden_axe: [
        ['wood', 'wood', null],
        ['wood', 'stick', null],
        [null, 'stick', null]
      ],
      wooden_shovel: [
        [null, 'wood', null],
        [null, 'stick', null],
        [null, 'stick', null]
      ],
      stone_pickaxe: [
        ['cobblestone', 'cobblestone', 'cobblestone'],
        [null, 'stick', null],
        [null, 'stick', null]
      ],
      stone_axe: [
        ['cobblestone', 'cobblestone', null],
        ['cobblestone', 'stick', null],
        [null, 'stick', null]
      ],
      stone_shovel: [
        [null, 'cobblestone', null],
        [null, 'stick', null],
        [null, 'stick', null]
      ]
    };

    // Create simple textures (we'll use colors for now, but this could be extended with actual textures)
    const blockMaterials = {};
    const itemTextures = {};

    function createMaterials() {
      // Block materials with colors
      const blockColors = {
        grass: 0x228B22,
        dirt: 0x8B4513,
        stone: 0x808080,
        cobblestone: 0x696969,
        wood: 0x8B4513,
        sand: 0xF4A460,
        iron_ore: 0xD3D3D3,
        coal_ore: 0x2F2F2F,
        gold_ore: 0xFFD700,
        diamond_ore: 0xB9F2FF
      };

      Object.keys(blockColors).forEach(block => {
        blockMaterials[block] = new THREE.MeshLambertMaterial({ color: blockColors[block] });
      });

      // Item textures (simplified)
      Object.keys(items).forEach(item => {
        itemTextures[item] = items[item].texture || item;
      });
    }

    function init() {
      createMaterials();

      // Scene
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x87CEEB);

      // Camera
      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 20, 0);

      // Renderer
      renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;

      // Lighting
      const ambientLight = new THREE.AmbientLight(0x404040, 0.4);
      scene.add(ambientLight);

      const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
      directionalLight.position.set(50, 50, 50);
      directionalLight.castShadow = true;
      directionalLight.shadow.mapSize.width = 2048;
      directionalLight.shadow.mapSize.height = 2048;
      directionalLight.shadow.camera.near = 0.5;
      directionalLight.shadow.camera.far = 200;
      directionalLight.shadow.camera.left = -100;
      directionalLight.shadow.camera.right = 100;
      directionalLight.shadow.camera.top = 100;
      directionalLight.shadow.camera.bottom = -100;
      scene.add(directionalLight);

      // Initialize UI
      createInventory();
      createHealthBar();
      updateUI();

      // Generate initial world
      generateChunk(0, 0);

      // Add mobs
      spawnMobs();

      // Give player starting items
      giveStartingItems();

      // Event listeners
      startButton.addEventListener('click', startGame);
      document.addEventListener('keydown', onKeyDown);
      document.addEventListener('keyup', onKeyUp);
      document.addEventListener('click', onMouseClick);
      document.addEventListener('contextmenu', onRightClick);
      document.addEventListener('wheel', onWheel);
      document.addEventListener('mousemove', onMouseMove);
      window.addEventListener('resize', onWindowResize);

      animate();
    }

    function createInventory() {
      // Create 36 inventory slots
      for (let i = 0; i < 36; i++) {
        const slot = document.createElement('div');
        slot.className = 'inventory-slot';
        slot.dataset.slot = i;
        slot.addEventListener('click', () => selectInventorySlot(i));
        inventoryGrid.appendChild(slot);
      }

      // Create 9 crafting slots
      for (let i = 0; i < 9; i++) {
        const slot = document.createElement('div');
        slot.className = 'inventory-slot';
        slot.dataset.craftingSlot = i;
        slot.addEventListener('click', () => selectCraftingSlot(i));
        craftingGrid.appendChild(slot);
      }
    }

    function createHealthBar() {
      for (let i = 0; i < 10; i++) {
        const heart = document.createElement('div');
        heart.className = 'heart';
        healthBar.appendChild(heart);
      }
      updateHealthBar();
    }

    function updateHealthBar() {
      const hearts = healthBar.children;
      for (let i = 0; i < 10; i++) {
        hearts[i].classList.toggle('empty', (i * 2) >= player.health);
      }
    }

    function giveStartingItems() {
      // Give player wooden tools and some basic blocks
      addItemToInventory('wooden_pickaxe', 1);
      addItemToInventory('wooden_axe', 1);
      addItemToInventory('wooden_shovel', 1);
      addItemToInventory('wood', 16);
      addItemToInventory('dirt', 16);
    }

    function addItemToInventory(itemId, count) {
      const item = items[itemId];
      if (!item) return;

      // Try to add to existing stacks first
      for (let i = 0; i < 36; i++) {
        if (player.inventory[i] && player.inventory[i].id === itemId && player.inventory[i].count < item.stackSize) {
          const space = item.stackSize - player.inventory[i].count;
          const addCount = Math.min(count, space);
          player.inventory[i].count += addCount;
          count -= addCount;
          if (count <= 0) break;
        }
      }

      // Add to empty slots
      for (let i = 0; i < 36; i++) {
        if (!player.inventory[i] && count > 0) {
          const addCount = Math.min(count, item.stackSize);
          player.inventory[i] = { id: itemId, count: addCount };
          count -= addCount;
        }
      }

      updateInventoryDisplay();
    }

    function updateInventoryDisplay() {
      const slots = inventoryGrid.children;
      for (let i = 0; i < 36; i++) {
        const slot = slots[i];
        const item = player.inventory[i];
        if (item) {
          slot.textContent = `${itemTextures[item.id]} ${item.count}`;
          slot.style.background = `rgba(100, 100, 100, 0.5)`;
        } else {
          slot.textContent = '';
          slot.style.background = 'rgba(255, 255, 255, 0.1)';
        }
      }

      // Update crafting grid
      const craftingSlots = craftingGrid.children;
      for (let i = 0; i < 9; i++) {
        const slot = craftingSlots[i];
        const item = player.craftingGrid[i];
        if (item) {
          slot.textContent = `${itemTextures[item.id]} ${item.count}`;
          slot.style.background = `rgba(100, 100, 100, 0.5)`;
        } else {
          slot.textContent = '';
          slot.style.background = 'rgba(255, 255, 255, 0.1)';
        }
      }

      // Check crafting result
      updateCraftingResult();
    }

    function updateCraftingResult() {
      const craftingPattern = [];
      for (let i = 0; i < 9; i++) {
        craftingPattern[i] = player.craftingGrid[i]?.id || null;
      }

      let result = null;
      for (const [recipeName, pattern] of Object.entries(recipes)) {
        if (arraysEqual(craftingPattern, pattern.flat())) {
          result = recipeName;
          break;
        }
      }

      if (result) {
        craftingResult.textContent = itemTextures[result];
        craftingResult.style.background = `rgba(100, 100, 100, 0.5)`;
        craftingResult.onclick = () => craftItem(result);
      } else {
        craftingResult.textContent = '';
        craftingResult.style.background = 'rgba(255, 255, 255, 0.1)';
        craftingResult.onclick = null;
      }
    }

    function craftItem(itemId) {
      // Remove ingredients
      const recipe = recipes[itemId];
      for (let i = 0; i < 9; i++) {
        if (recipe.flat()[i]) {
          player.craftingGrid[i].count--;
          if (player.craftingGrid[i].count <= 0) {
            player.craftingGrid[i] = null;
          }
        }
      }

      // Add result to inventory
      addItemToInventory(itemId, 1);
      updateInventoryDisplay();
    }

    function arraysEqual(a, b) {
      if (a.length !== b.length) return false;
      for (let i = 0; i < a.length; i++) {
        if (a[i] !== b[i]) return false;
      }
      return true;
    }

    function selectInventorySlot(slotIndex) {
      player.selectedSlot = slotIndex;
      updateInventoryDisplay();
    }

    function selectCraftingSlot(slotIndex) {
      // For now, just log - we'll implement drag and drop later
      console.log('Selected crafting slot:', slotIndex);
    }

    function getSelectedItem() {
      return player.inventory[player.selectedSlot];
    }

    function startGame() {
      const worldName = worldNameInput.value.trim() || 'New World';
      const seed = worldSeedInput.value.trim();
      console.log('Starting world:', worldName, 'seed:', seed);
      startScreen.style.display = 'none';
      document.body.classList.add('game-active');
      isLocked = true;
      ui.style.display = 'block';
      healthBar.style.display = 'flex';
      prevTime = performance.now();

      // Reset mouse position tracking
      prevMouseX = window.innerWidth / 2;
      prevMouseY = window.innerHeight / 2;
      console.log('Game started, isLocked:', isLocked);
    }

    function generateChunk(chunkX, chunkZ) {
      const chunkKey = `${chunkX},${chunkZ}`;
      if (loadedChunks.has(chunkKey)) return;
      loadedChunks.add(chunkKey);

      for (let x = 0; x < CHUNK_SIZE; x++) {
        for (let z = 0; z < CHUNK_SIZE; z++) {
          const worldX = chunkX * CHUNK_SIZE + x;
          const worldZ = chunkZ * CHUNK_SIZE + z;

          // Generate terrain with ores
          const height = Math.floor(Math.random() * 3) + 10;
          for (let y = 0; y < height; y++) {
            let blockType = 'dirt';
            if (y === height - 1) blockType = 'grass';
            if (y > height - 4 && Math.random() < 0.1) blockType = 'stone';
            if (y < height - 5 && Math.random() < 0.05) {
              if (y < 20) blockType = Math.random() < 0.3 ? 'coal_ore' : 'iron_ore';
              else if (y < 15) blockType = Math.random() < 0.1 ? 'gold_ore' : 'iron_ore';
              else if (y < 10) blockType = Math.random() < 0.05 ? 'diamond_ore' : 'coal_ore';
            }
            placeBlock(worldX, y, worldZ, blockType);
          }
        }
      }
    }

    function placeBlock(x, y, z, type) {
      const key = `${x},${y},${z}`;
      if (world[key]) {
        scene.remove(world[key]);
      }

      const geometry = new THREE.BoxGeometry(1, 1, 1);
      const material = blockMaterials[type] || blockMaterials.stone;
      const cube = new THREE.Mesh(geometry, material);
      cube.position.set(x, y, z);
      cube.castShadow = true;
      cube.receiveShadow = true;

      // Add wireframe edges for block outlines
      const edges = new THREE.EdgesGeometry(geometry);
      const lineMaterial = new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 1 });
      const wireframe = new THREE.LineSegments(edges, lineMaterial);
      cube.add(wireframe);

      scene.add(cube);
      world[key] = { mesh: cube, type: type };
    }

    function removeBlock(x, y, z) {
      const key = `${x},${y},${z}`;
      if (world[key]) {
        scene.remove(world[key].mesh);
        delete world[key];
      }
    }

    function breakBlock(x, y, z) {
      const key = `${x},${y},${z}`;
      if (world[key]) {
        const blockType = world[key].type;
        const properties = blockProperties[blockType];

        if (properties) {
          // Check if player has appropriate tool
          const selectedItem = getSelectedItem();
          let miningSpeed = 1;

          if (selectedItem && items[selectedItem.id] && items[selectedItem.id].type === 'tool') {
            const tool = items[selectedItem.id];
            if (tool.toolType === properties.tool) {
              miningSpeed = toolMaterials[tool.material].multiplier;
            }
          }

          // Drop the block/item
          const dropItem = properties.drops || blockType;
          addItemToInventory(dropItem, 1);

          // Give experience
          player.experience += 1;
          if (player.experience >= player.level * 10) {
            player.level += 1;
            player.experience = 0;
          }
        }

        removeBlock(x, y, z);
      }
    }

    function onKeyDown(event) {
      switch (event.code) {
        case 'ArrowUp':
        case 'KeyW':
          moveForward = true;
          break;
        case 'ArrowLeft':
        case 'KeyA':
          moveLeft = true;
          break;
        case 'ArrowDown':
        case 'KeyS':
          moveBackward = true;
          break;
        case 'ArrowRight':
        case 'KeyD':
          moveRight = true;
          break;
        case 'Space':
          if (canJump) {
            velocity.y += JUMP_FORCE;
            canJump = false;
          }
          break;
        case 'KeyE':
          toggleInventory();
          break;
        case 'Digit1':
        case 'Digit2':
        case 'Digit3':
        case 'Digit4':
        case 'Digit5':
        case 'Digit6':
        case 'Digit7':
        case 'Digit8':
        case 'Digit9':
          player.selectedSlot = parseInt(event.code.slice(-1)) - 1;
          updateUI();
          break;
      }
    }

    function toggleInventory() {
      inventoryOpen = !inventoryOpen;
      fullInventory.style.display = inventoryOpen ? 'block' : 'none';
      isLocked = !inventoryOpen;
    }

    function updateUI() {
      selectedBlockEl.textContent = getSelectedItem()?.id || 'None';
      updateInventoryDisplay();
      updateHealthBar();
    }

    function animate() {
      requestAnimationFrame(animate);

      const time = performance.now();
      const delta = time - prevTime;
      prevTime = time;

      // Update day/night cycle
      dayTime += delta * 0.001;
      const dayProgress = (dayTime % 24000) / 24000; // 24 second day cycle
      const lightIntensity = Math.max(0.1, Math.sin(dayProgress * Math.PI * 2));
      scene.children[1].intensity = lightIntensity; // Update directional light

      if (isLocked) {
        // Update camera rotation
        camera.rotation.order = 'YXZ';
        camera.rotation.y = yaw;
        camera.rotation.x = pitch;

        // Movement
        direction.set(0, 0, 0);
        if (moveForward) direction.z -= 1;
        if (moveBackward) direction.z += 1;
        if (moveLeft) direction.x -= 1;
        if (moveRight) direction.x += 1;

        direction.applyEuler(new THREE.Euler(0, yaw, 0));
        direction.normalize();

        if (moveForward || moveBackward || moveLeft || moveRight) {
          velocity.x = direction.x * MOVE_SPEED;
          velocity.z = direction.z * MOVE_SPEED;
        } else {
          velocity.x *= 0.8;
          velocity.z *= 0.8;
        }

        // Apply gravity
        velocity.y += GRAVITY * delta * 0.001;

        // Move camera
        camera.position.x += velocity.x * delta * 0.001;
        camera.position.y += velocity.y * delta * 0.001;
        camera.position.z += velocity.z * delta * 0.001;

        // Ground collision
        const groundY = getGroundHeight(camera.position.x, camera.position.z);
        if (camera.position.y <= groundY + 1.5) {
          velocity.y = 0;
          camera.position.y = groundY + 1.5;
          canJump = true;
        }

        // Update chunks
        updateChunks();

        // Update mobs
        updateMobs(delta);
      }

      // Update position display
      positionEl.textContent = `${Math.round(camera.position.x)}, ${Math.round(camera.position.y)}, ${Math.round(camera.position.z)}`;

      renderer.render(scene, camera);
    }

    function onKeyUp(event) {
      switch (event.code) {
        case 'ArrowUp':
        case 'KeyW':
          moveForward = false;
          break;
        case 'ArrowLeft':
        case 'KeyA':
          moveLeft = false;
          break;
        case 'ArrowDown':
        case 'KeyS':
          moveBackward = false;
          break;
        case 'ArrowRight':
        case 'KeyD':
          moveRight = false;
          break;
      }
    }

    function onMouseClick(event) {
      if (!isLocked || inventoryOpen) return;

      const raycaster = new THREE.Raycaster();
      const mouse = new THREE.Vector2();
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);

      const intersects = raycaster.intersectObjects(Object.values(world).map(b => b.mesh));
      if (intersects.length > 0) {
        const intersect = intersects[0];
        const point = intersect.point;
        const normal = intersect.face.normal;

        const blockPos = new THREE.Vector3(
          Math.floor(point.x + normal.x * 0.5),
          Math.floor(point.y + normal.y * 0.5),
          Math.floor(point.z + normal.z * 0.5)
        );

        breakBlock(blockPos.x, blockPos.y, blockPos.z);
      }
    }

    function onRightClick(event) {
      event.preventDefault();
      if (!isLocked || inventoryOpen) return;

      const raycaster = new THREE.Raycaster();
      const mouse = new THREE.Vector2();
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);

      const intersects = raycaster.intersectObjects(Object.values(world).map(b => b.mesh));
      if (intersects.length > 0) {
        const intersect = intersects[0];
        const point = intersect.point;
        const normal = intersect.face.normal;

        const blockPos = new THREE.Vector3(
          Math.floor(point.x + normal.x * 0.5),
          Math.floor(point.y + normal.y * 0.5),
          Math.floor(point.z + normal.z * 0.5)
        );

        const selectedItem = getSelectedItem();
        if (selectedItem && items[selectedItem.id] && items[selectedItem.id].type === 'block') {
          placeBlock(blockPos.x, blockPos.y, blockPos.z, selectedItem.id);
          selectedItem.count--;
          if (selectedItem.count <= 0) {
            player.inventory[player.selectedSlot] = null;
          }
          updateInventoryDisplay();
        }
      }
    }

    function onMouseMove(event) {
      if (!isLocked) {
        prevMouseX = event.clientX;
        prevMouseY = event.clientY;
        return;
      }

      const currentMouseX = event.clientX;
      const currentMouseY = event.clientY;

      const deltaX = currentMouseX - prevMouseX;
      const deltaY = currentMouseY - prevMouseY;

      prevMouseX = currentMouseX;
      prevMouseY = currentMouseY;

      const sensitivity = 0.002;
      yaw -= deltaX * sensitivity;
      pitch -= deltaY * sensitivity;

      pitch = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, pitch));
    }

    function onWheel(event) {
      if (inventoryOpen) return;
      player.selectedSlot = (player.selectedSlot + (event.deltaY > 0 ? 1 : -1) + 9) % 9;
      updateUI();
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function updateChunks() {
      const playerChunkX = Math.floor(camera.position.x / CHUNK_SIZE);
      const playerChunkZ = Math.floor(camera.position.z / CHUNK_SIZE);

      for (let dx = -1; dx <= 1; dx++) {
        for (let dz = -1; dz <= 1; dz++) {
          generateChunk(playerChunkX + dx, playerChunkZ + dz);
        }
      }
    }

    function spawnMobs() {
      const mobTypes = ['pig', 'sheep', 'cow', 'chicken'];
      for (let i = 0; i < 20; i++) {
        const type = mobTypes[Math.floor(Math.random() * mobTypes.length)];
        const x = (Math.random() - 0.5) * 100;
        const z = (Math.random() - 0.5) * 100;
        const y = 12;
        createMob(type, x, y, z);
      }
    }

    function createMob(type, x, y, z) {
      const geometry = new THREE.BoxGeometry(1, 1, 1);
      const material = new THREE.MeshLambertMaterial({ color: getMobColor(type) });
      const mob = new THREE.Mesh(geometry, material);
      mob.position.set(x, y, z);
      mob.userData = { type, velocity: new THREE.Vector3(), targetX: x, targetZ: z, moveTimer: 0 };
      scene.add(mob);
      mobs.push(mob);
    }

    function getMobColor(type) {
      const colors = {
        pig: 0xFF69B4,
        sheep: 0xFFFFFF,
        cow: 0x8B4513,
        chicken: 0xFFFF00
      };
      return colors[type] || 0xFF0000;
    }

    function updateMobs(delta) {
      mobs.forEach(mob => {
        mob.userData.moveTimer -= delta;
        if (mob.userData.moveTimer <= 0) {
          mob.userData.targetX = mob.position.x + (Math.random() - 0.5) * 20;
          mob.userData.targetZ = mob.position.z + (Math.random() - 0.5) * 20;
          mob.userData.moveTimer = Math.random() * 3000 + 1000;
        }

        const dx = mob.userData.targetX - mob.position.x;
        const dz = mob.userData.targetZ - mob.position.z;
        const dist = Math.sqrt(dx * dx + dz * dz);
        if (dist > 0.1) {
          mob.userData.velocity.x = (dx / dist) * 2;
          mob.userData.velocity.z = (dz / dist) * 2;
        } else {
          mob.userData.velocity.x = 0;
          mob.userData.velocity.z = 0;
        }

        mob.position.x += mob.userData.velocity.x * delta * 0.001;
        mob.position.z += mob.userData.velocity.z * delta * 0.001;

        const groundY = getGroundHeight(mob.position.x, mob.position.z);
        mob.position.y = groundY + 0.5;
      });
    }

    function getGroundHeight(x, z) {
      for (let y = WORLD_HEIGHT; y >= 0; y--) {
        if (world[`${Math.floor(x)},${y},${Math.floor(z)}`]) {
          return y + 1;
        }
      }
      return 10;
    }

    init();
  </script>
</body>
</html>
