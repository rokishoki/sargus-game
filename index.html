!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>סרגוס - הדג שמנקה את הים</title>
  <style>
    :root {
      --ocean-light: #53b8dc;
      --ocean-dark: #0d6f99;
      --sand: #f2d28a;
      --bubble: rgba(255, 255, 255, 0.45);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Arial", sans-serif;
      direction: rtl;
      background: radial-gradient(circle at top, #93dfff 0%, #0d5894 55%, #042d46 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .game-shell {
      width: min(920px, 100%);
      padding: 18px;
    }

    header {
      text-align: center;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 3vw, 3rem);
    }

    p {
      margin: 0;
      line-height: 1.5;
      font-size: 1rem;
    }

    .scoreboard {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 12px;
      font-size: 1.1rem;
    }

    canvas {
      width: 100%;
      background: linear-gradient(to bottom, rgba(83, 184, 220, 0.95), rgba(13, 111, 153, 0.95));
      border: 4px solid rgba(255, 255, 255, 0.22);
      border-radius: 18px;
      display: block;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.25);
    }

    .controls,
    footer {
      margin-top: 14px;
      text-align: center;
      font-size: 0.95rem;
    }

    .message {
      margin-top: 16px;
      text-align: center;
      padding: 12px 16px;
      border-radius: 14px;
      background: rgba(0, 0, 0, 0.45);
      font-weight: bold;
    }

    .hidden {
      display: none;
    }

    .restart {
      margin: 12px auto 0;
      display: block;
      border: none;
      background: #ffd740;
      color: #0e2f45;
      padding: 12px 20px;
      border-radius: 999px;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .restart:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 30px rgba(0, 0, 0, 0.18);
    }

    @media (max-width: 600px) {
      .scoreboard {
        flex-direction: column;
        align-items: center;
      }

      h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>
  <div class="game-shell">
    <header>
      <h1>סרגוס מנקה את האוקיינוס</h1>
      <p>השתמש במקשי החיצים כדי להזיז את סרגוס. תאכל את הזבל לפני שהוא מגיע לקרקעית.</p>
    </header>

    <main>
      <div class="scoreboard">
        <div>ניקיון: <span id="score">0</span></div>
        <div>חיים: <span id="lives">3</span></div>
      </div>
      <canvas id="gameCanvas" width="800" height="520"></canvas>
      <div class="controls">
        <span>שימוש בחיצים</span>
        <span>או ישירות על המסך במגע</span>
      </div>
      <div id="message" class="message hidden"></div>
      <button id="restartButton" class="restart hidden">התחל מחדש</button>
    </main>

    <footer>
      <p>הציל את הים בעזרת סרגוס!</p>
    </footer>
  </div>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const livesEl = document.getElementById("lives");
    const messageEl = document.getElementById("message");
    const restartButton = document.getElementById("restartButton");

    const state = {
      score: 0,
      lives: 3,
      running: true,
      width: canvas.width,
      height: canvas.height,
      keys: {
        ArrowLeft: false,
        ArrowRight: false,
        ArrowUp: false,
        ArrowDown: false,
      },
      touch: null,
      trash: [],
      lastSpawn: 0,
    };

    const fish = {
      x: state.width / 2,
      y: state.height * 0.6,
      size: 42,
      speed: 5,
      direction: 1,
    };

    const trashTypes = [
      { color: "#f8f08b", radius: 14 },
      { color: "#ff7b7b", radius: 16 },
      { color: "#6dd7ff", radius: 12 },
    ];

    function resetGame() {
      state.score = 0;
      state.lives = 3;
      state.running = true;
      state.trash = [];
      state.lastSpawn = 0;
      fish.x = state.width / 2;
      fish.y = state.height * 0.6;
      messageEl.classList.add("hidden");
      restartButton.classList.add("hidden");
      updateUI();
      requestAnimationFrame(loop);
    }

    function updateUI() {
      scoreEl.textContent = state.score;
      livesEl.textContent = state.lives;
    }

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function spawnTrash() {
      const type = trashTypes[Math.floor(Math.random() * trashTypes.length)];
      state.trash.push({
        x: Math.random() * (state.width - 80) + 40,
        y: -30,
        speed: Math.random() * 1.8 + 1.2,
        radius: type.radius,
        color: type.color,
        angle: Math.random() * Math.PI * 2,
      });
    }

    function updateFish() {
      const step = fish.speed;
      let dx = 0;
      let dy = 0;
      if (state.keys.ArrowLeft) dx -= step;
      if (state.keys.ArrowRight) dx += step;
      if (state.keys.ArrowUp) dy -= step;
      if (state.keys.ArrowDown) dy += step;
      if (state.touch) {
        dx = state.touch.x - fish.x;
        dy = state.touch.y - fish.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > step) {
          dx = (dx / dist) * step;
          dy = (dy / dist) * step;
        }
      }
      fish.x += dx;
      fish.y += dy;
      fish.x = clamp(fish.x, fish.size, state.width - fish.size);
      fish.y = clamp(fish.y, fish.size, state.height - fish.size);
      fish.direction = dx >= 0 ? 1 : -1;
    }

    function updateTrash(delta) {
      for (const item of state.trash) {
        item.y += item.speed;
        item.angle += 0.03;
      }
      state.trash = state.trash.filter((item) => {
        const dist = Math.hypot(item.x - fish.x, item.y - fish.y);
        if (dist < fish.size + item.radius - 4) {
          state.score += 1;
          return false;
        }
        if (item.y - item.radius > state.height) {
          state.lives -= 1;
          return false;
        }
        return true;
      });
    }

    function drawBackground() {
      const gradient = ctx.createLinearGradient(0, 0, 0, state.height);
      gradient.addColorStop(0, "#78c7e2");
      gradient.addColorStop(0.6, "#1f7ea4");
      gradient.addColorStop(1, "#06405f");
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, state.width, state.height);

      for (let i = 0; i < 12; i += 1) {
        const x = (i * 90 + (performance.now() / 60) % 90) % state.width;
        const y = 80 + ((i * 30 + performance.now() / 80) % (state.height - 150));
        ctx.fillStyle = "rgba(255,255,255,0.12)";
        ctx.beginPath();
        ctx.arc(x, y, 12, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawFish() {
      ctx.save();
      ctx.translate(fish.x, fish.y);
      ctx.scale(fish.direction, 1);

      ctx.fillStyle = "#f6c773";
      ctx.beginPath();
      ctx.ellipse(0, 0, fish.size, fish.size * 0.65, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#e0a954";
      ctx.beginPath();
      ctx.ellipse(-10, 0, fish.size * 0.7, fish.size * 0.5, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#fff";
      ctx.beginPath();
      ctx.arc(12, -8, 7, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#1d2437";
      ctx.beginPath();
      ctx.arc(14, -8, 3.5, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#fed176";
      ctx.beginPath();
      ctx.moveTo(-fish.size * 0.4, 12);
      ctx.quadraticCurveTo(-fish.size * 0.2, fish.size * 0.5, 8, 10);
      ctx.quadraticCurveTo(-fish.size * 0.1, fish.size * 0.2, -fish.size * 0.4, 12);
      ctx.fill();

      ctx.restore();
    }

    function drawTrash() {
      for (const item of state.trash) {
        ctx.save();
        ctx.translate(item.x, item.y);
        ctx.rotate(Math.sin(item.angle) * 0.4);
        ctx.fillStyle = item.color;
        ctx.beginPath();
        ctx.rect(-item.radius, -item.radius, item.radius * 2, item.radius * 2);
        ctx.fill();
        ctx.fillStyle = "rgba(255,255,255,0.4)";
        ctx.beginPath();
        ctx.arc(-item.radius / 3, -item.radius / 3, item.radius * 0.35, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function drawSand() {
      ctx.fillStyle = "#f1d48b";
      ctx.beginPath();
      ctx.moveTo(0, state.height);
      ctx.quadraticCurveTo(state.width * 0.25, state.height - 70, state.width * 0.5, state.height - 20);
      ctx.quadraticCurveTo(state.width * 0.75, state.height + 10, state.width, state.height - 55);
      ctx.lineTo(state.width, state.height);
      ctx.closePath();
      ctx.fill();
    }

    function loop(timestamp) {
      if (!state.running) return;

      if (timestamp - state.lastSpawn > 850) {
        spawnTrash();
        state.lastSpawn = timestamp;
      }

      updateFish();
      updateTrash(timestamp);
      drawBackground();
      drawTrash();
      drawFish();
      drawSand();
      updateUI();

      if (state.lives <= 0) {
        state.running = false;
        messageEl.textContent = `המשחק נגמר! ניקית ${state.score} חתיכות זבל`;
        messageEl.classList.remove("hidden");
        restartButton.classList.remove("hidden");
        return;
      }

      requestAnimationFrame(loop);
    }

    window.addEventListener("keydown", (event) => {
      if (event.key in state.keys) {
        state.keys[event.key] = true;
      }
    });

    window.addEventListener("keyup", (event) => {
      if (event.key in state.keys) {
        state.keys[event.key] = false;
      }
    });

    canvas.addEventListener("pointerdown", (event) => {
      const rect = canvas.getBoundingClientRect();
      state.touch = {
        x: (event.clientX - rect.left) * (canvas.width / rect.width),
        y: (event.clientY - rect.top) * (canvas.height / rect.height),
      };
    });

    canvas.addEventListener("pointermove", (event) => {
      if (event.buttons !== 1) return;
      const rect = canvas.getBoundingClientRect();
      state.touch = {
        x: (event.clientX - rect.left) * (canvas.width / rect.width),
        y: (event.clientY - rect.top) * (canvas.height / rect.height),
      };
    });

    canvas.addEventListener("pointerup", () => {
      state.touch = null;
    });

    restartButton.addEventListener("click", resetGame);
    resetGame();
  </script>
</body>
</html>
